<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperSaut — Jeu de Plateforme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="hud">
            <div class="hud-block">
                <span class="hud-label">PIÈCES</span>
                <span id="score-value">0 / 10</span>
            </div>
            <div class="hud-block">
                <span class="hud-label">NIVEAU</span>
                <span id="level-value">1</span>
            </div>
            <div class="hud-block">
                <span class="hud-label">VIES</span>
                <span id="lives-value">❤️❤️❤️</span>
            </div>
            <div class="hud-actions">
                <span id="save-indicator" title="Progression sauvegardée">💾</span>
                <button id="btn-pause" tabindex="-1">⏸ Pause</button>
                <button id="btn-restart" tabindex="-1">↺ Restart</button>
                <button id="btn-clear-save" tabindex="-1">🗑 Effacer</button>
                <button id="btn-fullscreen" tabindex="-1">⛶ Plein écran</button>
            </div>
        </div>

        <!-- Canvas + touch controls in same container -->
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>

            <!-- Mobile touch controls — overlaid on canvas -->
            <div id="touch-controls">
                <div id="touch-left">
                    <div id="btn-left" class="touch-btn">◀</div>
                    <div id="btn-right" class="touch-btn">▶</div>
                </div>
                <div id="touch-right">
                    <div id="btn-jump" class="touch-btn touch-jump">▲</div>
                </div>
            </div>
        </div>

        <div id="controls-hint">← → Déplacer &nbsp;|&nbsp; ESPACE Sauter &nbsp;|&nbsp; P Pause &nbsp;|&nbsp; R Restart</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
