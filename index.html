<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperSaut — Jeu de Plateforme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="hud">
            <div class="hud-block">
                <span class="hud-label">PIÈCES</span>
                <span id="score-value">0 / 10</span>
            </div>
            <div class="hud-block">
                <span class="hud-label">NIVEAU</span>
                <span id="level-value">1</span>
            </div>
            <div class="hud-block">
                <span class="hud-label">VIES</span>
                <span id="lives-value">❤️❤️❤️</span>
            </div>
            <div class="hud-block">
                <span class="hud-label">BONUS</span>
                <span id="bonus-value">★0</span>
            </div>
            <div class="hud-actions">
                <span id="save-indicator" title="Progression sauvegardée">💾</span>
                <button id="btn-pause" tabindex="-1">⏸ Pause</button>
                <button id="btn-restart" tabindex="-1">↺ Restart</button>
                <button id="btn-clear-save" tabindex="-1">🗑 Effacer</button>
                <button id="btn-fullscreen" tabindex="-1" class="desktop-only">⛶ Plein écran</button>
            </div>
        </div>

        <div id="game-container">
            <!-- SVG filter for barrel distortion -->
        <svg style="position:absolute;width:0;height:0">
          <defs>
            <filter id="crt-barrel">
              <feTurbulence type="fractalNoise" baseFrequency="0.0002" numOctaves="1" result="noise"/>
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
          </defs>
        </svg>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <!-- CRT overlay: scanlines + vignette -->
        <div id="crt-overlay"></div>
        </div>

        <!-- Touch controls — outside canvas, always visible on mobile -->
        <div id="touch-controls">
            <div id="touch-left">
                <div id="btn-left" class="touch-btn">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="none">
    <polygon points="17,4 7,12 17,20" fill="currentColor"/>
  </svg>
</div>
                <div id="btn-right" class="touch-btn">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="none">
    <polygon points="7,4 17,12 7,20" fill="currentColor"/>
  </svg>
</div>
            </div>
            <div id="touch-right">
                <div id="btn-dash" class="touch-btn touch-dash">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                  </svg>
                  <span>DASH</span>
                </div>
                <div id="btn-jump" class="touch-btn touch-jump">
                  <svg viewBox="0 0 24 24" width="30" height="30" fill="none">
                    <polygon points="12,4 22,20 2,20" fill="currentColor"/>
                  </svg>
                  <span>SAUT</span>
                </div>
            </div>
        </div>

        <div id="controls-hint">← → Déplacer &nbsp;|&nbsp; ESPACE Sauter &nbsp;|&nbsp; P Pause &nbsp;|&nbsp; R Restart</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
